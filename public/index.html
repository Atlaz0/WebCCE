<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Romantismi kuulamiskava</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --bg2: #ffffff;
      --bg3: #eceae4;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-bar: #639922;
      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e6e0;
        --text2: #a0a09a;
        --text3: #666662;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.15);
        --green-bg: #173404;
        --green-text: #97c459;
        --green-bar: #639922;
        --red-bg: #501313;
        --red-text: #f09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 560px; }

    h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text3);
      margin-bottom: 1.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #stats { display: flex; gap: 1.25rem; margin-bottom: 1rem; }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-num { font-size: 26px; font-weight: 500; line-height: 1; color: var(--text); }
    .stat-num.green { color: var(--green-text); }
    .stat-num.red { color: var(--red-text); }
    .stat-label { font-size: 12px; color: var(--text3); }

    #progress-bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--green-bar);
      border-radius: 3px;
      transition: width 0.35s ease;
    }

    #dots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
    .dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      font-size: 11px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all 0.15s;
      user-select: none;
    }
    .dot:hover { border-color: var(--text3); }
    .dot.active { border-color: var(--text); color: var(--text); background: var(--bg3); }
    .dot.know { background: var(--green-bg); border-color: var(--green-bg); color: var(--green-text); }
    .dot.dontknow { background: var(--red-bg); border-color: var(--red-bg); color: var(--red-text); }
    .dot.know.active { border-color: var(--green-text); }
    .dot.dontknow.active { border-color: var(--red-text); }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem 1.75rem;
      margin-bottom: 1rem;
    }
    .card-index { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
    .card-composer { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 0.35rem; transition: filter 0.15s; }
    .card-title { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 0.4rem; transition: filter 0.15s; }
    .card-detail { font-size: 14px; color: var(--text2); transition: filter 0.15s; }
    .blurred { filter: blur(5px); cursor: pointer; }
    .blurred:hover { filter: blur(0); }

    .status-badge {
      display: inline-block;
      margin-top: 1.1rem;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 13px; font-weight: 500;
    }
    .badge-know { background: var(--green-bg); color: var(--green-text); }
    .badge-dontknow { background: var(--red-bg); color: var(--red-text); }

    #player-wrap {
      background: var(--bg3);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 0.75rem;
    }
    #play-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: center;
      transition: opacity 0.15s, transform 0.1s;
      position: relative;
    }
    #play-btn:hover { opacity: 0.85; transform: scale(1.05); }
    #play-btn:active { transform: scale(0.95); }
    #play-btn svg { width: 20px; height: 20px; fill: var(--bg); }
    #seek-wrap { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; padding-top: 15px; }
    #seek {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
    }
    #seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }
    #seek::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
    }
    #time-display { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }

    #btn-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
    .btn {
      flex: 1; padding: 0.85rem;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn-know { background: var(--green-bg); color: var(--green-text); }
    .btn-dontknow { background: var(--red-bg); color: var(--red-text); }

    #toggles { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      user-select: none;
    }
    .toggle-label { font-size: 13px; color: var(--text2); }
    .toggle-sw {
      width: 36px; height: 20px;
      background: var(--border2);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-sw::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle-sw.on { background: var(--green-bar); }
    .toggle-sw.on::after { transform: translateX(16px); }

    #clip-duration-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.85rem 0.55rem 2.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      margin-top: -0.5rem;
    }
    #clip-duration-row.visible { display: flex; }
    #clip-duration-row label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .clip-stepper { display: flex; align-items: center; gap: 0.5rem; }
    .clip-step-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      font-size: 16px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .clip-step-btn:hover { border-color: var(--text3); }
    .clip-step-btn:active { opacity: 0.7; }
    #clip-val {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      min-width: 42px;
      text-align: center;
    }

    #nav-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .btn-nav {
      flex: 1; padding: 0.55rem;
      border: 1px solid var(--border2);
      background: var(--bg2);
      border-radius: var(--radius-md);
      font-size: 13px; cursor: pointer;
      color: var(--text2); font-family: inherit;
      transition: border-color 0.15s;
    }
    .btn-nav:hover { border-color: var(--text3); }

    #reset-wrap { text-align: center; }
    #reset-btn {
      font-size: 12px; color: var(--text3);
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
      font-family: inherit; padding: 0;
    }
    #reset-btn:hover { color: var(--text2); }

    @media (max-width: 600px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      #app { max-width: 100%; }
      h1 { font-size: 11px; margin-bottom: 1.25rem; }
      .stat-num { font-size: 22px; }
      .stat-label { font-size: 11px; }
      #stats { gap: 1rem; }
      .dot { width: 34px; height: 34px; font-size: 12px; }
      .card { padding: 1.25rem; }
      .card-composer { font-size: 14px; }
      .card-title { font-size: 22px; }
      .card-detail { font-size: 15px; }
      .card-index { font-size: 13px; }
      .status-badge { font-size: 14px; padding: 5px 14px; }
      #play-btn { width: 52px; height: 52px; }
      #player-wrap { padding: 0.9rem 1rem; }
      #seek { height: 6px; }
      #seek::-webkit-slider-thumb { width: 18px; height: 18px; }
      #seek::-moz-range-thumb { width: 18px; height: 18px; }
      #time-display { font-size: 13px; }
      .btn { padding: 1rem; font-size: 17px; }
      .toggle-row { padding: 0.75rem 1rem; }
      .toggle-label { font-size: 15px; }
      .toggle-sw { width: 44px; height: 24px; }
      .toggle-sw::after { width: 18px; height: 18px; }
      .toggle-sw.on::after { transform: translateX(20px); }
      .btn-nav { padding: 0.75rem; font-size: 15px; }
      #reset-btn { font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="app">
  <h1>Romantismi kuulamiskava</h1>

  <div id="stats">
    <div class="stat">
      <span class="stat-num" id="stat-total">20</span>
      <span class="stat-label">Kokku</span>
    </div>
    <div class="stat">
      <span class="stat-num green" id="stat-know">0</span>
      <span class="stat-label">Tean</span>
    </div>
    <div class="stat">
      <span class="stat-num red" id="stat-dontknow">0</span>
      <span class="stat-label">Ei tea</span>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar" style="width:0%"></div>
  </div>

  <div id="dots"></div>

  <div class="card">
    <div class="card-index" id="card-index"></div>
    <div class="card-composer" id="card-composer"></div>
    <div class="card-title" id="card-title"></div>
    <div class="card-detail" id="card-detail"></div>
    <div id="card-badge"></div>
  </div>

  <div id="player-wrap">
    <button id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div id="seek-wrap">
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" oninput="seekTo(this.value)">
      <span id="time-display">0:00 / 0:00</span>
    </div>
  </div>

  <div id="btn-row">
    <button class="btn btn-know" onclick="mark('know')">Tean</button>
    <button class="btn btn-dontknow" onclick="mark('dontknow')">Ei tea</button>
  </div>

  <div id="toggles">
    <div class="toggle-row" onclick="toggleMode('autoplay')">
      <span class="toggle-label">Automaatne mängimine</span>
      <div class="toggle-sw on" id="sw-autoplay"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('random')">
      <span class="toggle-label">Juhuslik alguskoht</span>
      <div class="toggle-sw" id="sw-random"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('shuffle')">
      <span class="toggle-label">Suvaline järjekord</span>
      <div class="toggle-sw" id="sw-shuffle"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('clip')">
      <span class="toggle-label">Lõigu pikkus</span>
      <div class="toggle-sw" id="sw-clip"></div>
    </div>
    <div id="clip-duration-row">
      <label>Kestus</label>
      <div class="clip-stepper">
        <button class="clip-step-btn" type="button" onclick="stepClip(-5)">−</button>
        <span id="clip-val">10 s</span>
        <button class="clip-step-btn" type="button" onclick="stepClip(5)">+</button>
      </div>
    </div>
    <div class="toggle-row" onclick="toggleMode('blur')">
      <span class="toggle-label">Peida nimed</span>
      <div class="toggle-sw" id="sw-blur"></div>
    </div>
  </div>

  <div id="nav-row">
    <button class="btn-nav" onclick="go(-1)">Eelmine laul</button>
    <button class="btn-nav" onclick="go(1)">Järgmine laul</button>
  </div>

  <div id="reset-wrap">
    <button id="reset-btn" onclick="resetAll()">Kustuta kõik valikud</button>
  </div>
</div>

<script>
  function audioFile(name) {
    return "/audio/" + encodeURIComponent(name);
  }

  var SONGS = [
    {
      composer: "Franz Schubert",
      title: "Rändamine",
      detail: 'laulutsüklist "Ilus möldrineiu"',
      audio: audioFile("Franz Schubert Rändamine laulutsüklist Ilus möldrineiu.mp3")
    },
    {
      composer: "Franz Schubert",
      title: "Metshaldjas",
      detail: "ballaad",
      audio: audioFile("Franz Schubert ballaad Metshaldjas.mp3")
    },
    {
      composer: "Fryderyk Chopin",
      title: "Etüüd op 10 nr 12",
      detail: '"Revolutsiooniline"',
      audio: audioFile("Fyderyk Chopin Etüüd op 10 nr 12 Revolutsiooniline.mp3")
    },
    {
      composer: "Fryderyk Chopin",
      title: "Prelüüd op 28 nr 15",
      detail: '"Vihmapiiskade prelüüd"',
      audio: audioFile("Fryderyk Chopin Prelüüd op 28 nr 15 Vihmapiiskade prelüüd.mp3")
    },
    {
      composer: "Ferenc Liszt",
      title: "Etüüd nr 12",
      detail: '"Tuisk"',
      audio: audioFile("Ferenc Liszt Etüüd nr 12 Tuisk.mp3")
    },
    {
      composer: "Giuseppe Verdi",
      title: 'Orjade koor ooperist "Nabucco"',
      detail: "",
      audio: audioFile("Giuseppe Verdi orjade koor ooperist Nabucco.mp3")
    },
    {
      composer: "Giuseppe Verdi",
      title: '"Va pensiero"',
      detail: 'ooperist "Nabucco"',
      audio: audioFile("G.Verdi (orjade) koor ooperist Nabucco - Va pensiero.mp3")
    },
    {
      composer: "Giuseppe Verdi",
      title: 'Stseen I vaatusest ooperist "Traviata"',
      detail: "",
      audio: audioFile("Giuseppe Verdi Stseen I vaatusest ooperist Traviata.mp3")
    },
    {
      composer: "Giuseppe Verdi",
      title: 'Stseen I vaatusest ooperist "Traviata"',
      detail: "(Joogilaul)",
      audio: audioFile("Giuseppe Verdi Stseen I vaatusest ooperist Traviata, (Joogilaul).mp3")
    },
    {
      composer: "Richard Wagner",
      title: 'Palverändurite koor ooperist "Tannhäuser"',
      detail: "",
      audio: audioFile("Richard Wagner Palverändurite koor ooperist Tannhäuser .mp3")
    },
    {
      composer: "Jacques Offenbach",
      title: 'Kankaan operetist "Orpheus põrgus"',
      detail: "",
      audio: audioFile("Jacques Offenbach Kankaan operetist Orpheus põrgus.mp3")
    },
    {
      composer: "Johann Strauss (noorem)",
      title: '"Ilusal sinisel Doonaul"',
      detail: "",
      audio: audioFile("Johann Strauss (noorem) Ilusal sinisel Doonaul.mp3")
    },
    {
      composer: "Georges Bizet",
      title: 'Habaneera ooperist "Carmen"',
      detail: "",
      audio: audioFile("Georges Bizet Habaneera ooperist Carmen.mp3")
    },
    {
      composer: "Georges Bizet",
      title: 'Ooper "Carmen" - Habaneera',
      detail: "",
      audio: audioFile("Georges Bizet ooper Carmen - Habaneera.mp3")
    },
    {
      composer: "Pjotr Tšaikovski",
      title: 'Ballett "Luikede järv"',
      detail: "stseen",
      audio: audioFile("Pjotr Tšaikovski ballett Luikede järv - stseen.mp3")
    },
    {
      composer: "Edvard Grieg",
      title: '"Hommikumeeleolu"',
      detail: 'süidist "Peer Gynt"',
      audio: audioFile("Edvard Grieg Hommikumeeleolu süidist Peer Gynt.mp3")
    },
    {
      composer: "Edvard Grieg",
      title: '"Anitra tants"',
      detail: 'süidist "Peer Gynt"',
      audio: audioFile("Edvard Grieg Anitra tants süidist Peer Gynt.mp3")
    },
    {
      composer: "Jean Sibelius",
      title: 'Sümfooniline poeem "Finlandia"',
      detail: "",
      audio: audioFile("Jean Sibelius sümfooniline poeem Finlandia.mp3")
    },
    {
      composer: "Jean Sibelius",
      title: 'Sümfooniline poeem "Finlandia"',
      detail: "(kooriversioon)",
      audio: audioFile("Jean Sibelius sümfooniline poeem Finlandia (kooriversioon).mp3")
    },
    {
      composer: "Johannes Brahms",
      title: "Sümfoonia nr 4",
      detail: "I osa (0:27-12:56)",
      audio: audioFile("Johannes Brahms Sümfoonia nr 4 I osa (027-1256).mp3")
    }
  ];

  var KEY = "romantism_v1";
  var state = { marks: {}, seen: {} };
  try {
    var sv = localStorage.getItem(KEY);
    if (sv) state = JSON.parse(sv);
  } catch (e) {}

  var cur = 0;
  var loadedIdx = -1;
  var modeAutoplay = true;
  var modeRandom = false;
  var modeShuffle = false;
  var modeClip = false;
  var modeBlur = false;
  var clipDuration = 10;
  var clipTimer = null;
  var shuffleQueue = [];
  var player = new Audio();

  document.getElementById("stat-total").textContent = SONGS.length;

  player.addEventListener("timeupdate", function() {
    if (!player.duration) return;
    document.getElementById("seek").value = (player.currentTime / player.duration) * 100;
    document.getElementById("time-display").textContent =
      fmt(player.currentTime) + " / " + fmt(player.duration);
  });

  player.addEventListener("ended", function() {
    clearClipTimer();
    if (modeAutoplay) {
      cur = nextIdx(cur, 1);
      state.seen[cur] = true;
      save();
      render(true);
    } else {
      document.getElementById("play-icon").outerHTML =
        '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    }
  });

  player.addEventListener("loadedmetadata", function() {
    document.getElementById("time-display").textContent = "0:00 / " + fmt(player.duration);
    if (player.duration > 0 && (modeRandom || modeClip)) {
      player.currentTime = Math.random() * player.duration;
    }
  });

  player.addEventListener("error", function() {
    document.getElementById("time-display").textContent = "Viga";
  });

  function fmt(sec) {
    var m = Math.floor(sec / 60);
    var s2 = Math.floor(sec % 60).toString().padStart(2, "0");
    return m + ":" + s2;
  }

  function clearClipTimer() {
    if (clipTimer) {
      clearTimeout(clipTimer);
      clipTimer = null;
    }
  }

  function startClipTimer() {
    clearClipTimer();
    if (!modeClip) return;
    var remaining = player.duration ? (player.duration - player.currentTime) : clipDuration;
    var wait = Math.min(clipDuration, remaining) * 1000;
    clipTimer = setTimeout(function() {
      player.pause();
      document.getElementById("play-icon").outerHTML =
        '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    }, wait);
  }

  function stepClip(delta) {
    clipDuration = Math.max(5, Math.min(300, clipDuration + delta));
    document.getElementById("clip-val").textContent = clipDuration + " s";
  }

  function loadSong(idx, autoplay) {
    if (loadedIdx === idx) {
      if (autoplay && player.paused) {
        player.play().then(function() {
          document.getElementById("play-icon").outerHTML =
            '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
          startClipTimer();
        }).catch(function() {});
      }
      return;
    }

    clearClipTimer();
    player.pause();
    player.src = SONGS[idx].audio;
    player.load();
    loadedIdx = idx;

    document.getElementById("play-icon").outerHTML =
      '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    document.getElementById("seek").value = 0;
    document.getElementById("time-display").textContent = "0:00 / 0:00";

    if ("mediaSession" in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: SONGS[idx].title,
        artist: SONGS[idx].composer,
        album: "Romantismi kuulamiskava"
      });
    }

    if (autoplay) {
      player.addEventListener("canplay", function onCanPlay() {
        player.removeEventListener("canplay", onCanPlay);
        player.play().then(function() {
          document.getElementById("play-icon").outerHTML =
            '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
          startClipTimer();
        }).catch(function() {});
      });
    }
  }

  function togglePlay() {
    if (loadedIdx !== cur) {
      loadSong(cur, true);
      return;
    }

    if (player.paused) {
      player.play().then(function() {
        document.getElementById("play-icon").outerHTML =
          '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
        startClipTimer();
      }).catch(function(e) {
        console.warn("Play failed", e);
      });
    } else {
      player.pause();
      document.getElementById("play-icon").outerHTML =
        '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
      clearClipTimer();
    }
  }

  function seekTo(val) {
    if (player.duration) {
      player.currentTime = (val / 100) * player.duration;
    }
  }

  function buildShuffleQueue() {
    var n = SONGS.length;
    var arr = [];
    for (var i = 0; i < n; i++) {
      if (state.marks[i] !== "know") arr.push(i);
    }

    for (var j = arr.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = arr[j];
      arr[j] = arr[k];
      arr[k] = tmp;
    }

    shuffleQueue = arr;
  }

  function toggleMode(mode) {
    if (mode === "autoplay") {
      modeAutoplay = !modeAutoplay;
      document.getElementById("sw-autoplay").classList.toggle("on", modeAutoplay);
    } else if (mode === "random") {
      modeRandom = !modeRandom;
      document.getElementById("sw-random").classList.toggle("on", modeRandom);
    } else if (mode === "shuffle") {
      modeShuffle = !modeShuffle;
      document.getElementById("sw-shuffle").classList.toggle("on", modeShuffle);
      if (modeShuffle) buildShuffleQueue();
    } else if (mode === "clip") {
      modeClip = !modeClip;
      document.getElementById("sw-clip").classList.toggle("on", modeClip);
      document.getElementById("clip-duration-row").classList.toggle("visible", modeClip);
      if (!modeClip) clearClipTimer();
    } else if (mode === "blur") {
      modeBlur = !modeBlur;
      document.getElementById("sw-blur").classList.toggle("on", modeBlur);
      applyBlur();
    }
  }

  function applyBlur() {
    ["card-composer", "card-title", "card-detail"].forEach(function(id) {
      document.getElementById(id).classList.toggle("blurred", modeBlur);
    });
  }

  function nextIdx(from, dir) {
    var n = SONGS.length;

    if (modeShuffle) {
      if (!shuffleQueue.length) buildShuffleQueue();
      if (!shuffleQueue.length) return from;
      return shuffleQueue.shift();
    }

    var idx = (from + dir + n) % n;
    for (var i = 0; i < n - 1; i++) {
      if (state.marks[idx] !== "know") return idx;
      idx = (idx + dir + n) % n;
    }
    return (from + dir + n) % n;
  }

  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) {}
  }

  function render(autoplay) {
    var s = SONGS[cur];
    document.getElementById("card-index").textContent = (cur + 1) + " / " + SONGS.length;
    document.getElementById("card-composer").textContent = s.composer;
    document.getElementById("card-title").textContent = s.title;
    document.getElementById("card-detail").textContent = s.detail;
    applyBlur();

    var badge = document.getElementById("card-badge");
    var m = state.marks[cur];
    if (m === "know") {
      badge.innerHTML = '<span class="status-badge badge-know">Tean</span>';
    } else if (m === "dontknow") {
      badge.innerHTML = '<span class="status-badge badge-dontknow">Ei tea</span>';
    } else {
      badge.innerHTML = "";
    }

    updateStats();
    renderDots();
    loadSong(cur, !!autoplay);
  }

  function updateStats() {
    var know = Object.values(state.marks).filter(function(v) { return v === "know"; }).length;
    var dont = Object.values(state.marks).filter(function(v) { return v === "dontknow"; }).length;

    document.getElementById("stat-know").textContent = know;
    document.getElementById("stat-dontknow").textContent = dont;
    document.getElementById("progress-bar").style.width =
      (((know + dont) / SONGS.length) * 100).toFixed(1) + "%";
  }

  function renderDots() {
    var wrap = document.getElementById("dots");
    wrap.innerHTML = "";

    SONGS.forEach(function(_, i) {
      var d = document.createElement("div");
      var cls = "dot";
      if (i === cur) cls += " active";
      if (state.marks[i] === "know") cls += " know";
      else if (state.marks[i] === "dontknow") cls += " dontknow";

      d.className = cls;
      d.textContent = i + 1;
      d.onclick = (function(idx) {
        return function() {
          var wasPlaying = !player.paused;
          cur = idx;
          state.seen[idx] = true;
          save();
          render(wasPlaying);
        };
      })(i);

      wrap.appendChild(d);
    });
  }

  function mark(val) {
    state.marks[cur] = val;
    state.seen[cur] = true;
    save();

    cur = nextIdx(cur, 1);
    state.seen[cur] = true;
    save();

    render(false);
  }

  function go(dir) {
    var wasPlaying = !player.paused;
    cur = nextIdx(cur, dir);
    state.seen[cur] = true;
    save();
    render(wasPlaying);
  }

  function resetAll() {
    if (!confirm("Kustuta kõik valikud?")) return;
    state = { marks: {}, seen: {} };
    cur = 0;
    save();
    render(false);
  }

  document.addEventListener("keydown", function(e) {
    if (e.target.tagName === "INPUT") return;

    if (e.key === "ArrowRight" || e.key === "ArrowDown") go(1);
    else if (e.key === "ArrowLeft" || e.key === "ArrowUp") go(-1);
    else if (e.key === "k" || e.key === "K") mark("know");
    else if (e.key === "e" || e.key === "E") mark("dontknow");
    else if (e.key === " ") {
      e.preventDefault();
      togglePlay();
    }
  });

  state.seen[0] = true;
  save();
  render(false);
</script>
</body>
</html>
