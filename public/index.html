<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klassitsismi kuulamiskava</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --bg2: #ffffff;
      --bg3: #eceae4;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-bar: #639922;
      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e6e0;
        --text2: #a0a09a;
        --text3: #666662;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.15);
        --green-bg: #173404;
        --green-text: #97c459;
        --green-bar: #639922;
        --red-bg: #501313;
        --red-text: #f09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 560px; }

    h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text3);
      margin-bottom: 1.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #stats { display: flex; gap: 1.25rem; margin-bottom: 1rem; }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-num { font-size: 26px; font-weight: 500; line-height: 1; color: var(--text); }
    .stat-num.green { color: var(--green-text); }
    .stat-num.red { color: var(--red-text); }
    .stat-label { font-size: 12px; color: var(--text3); }

    #progress-bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--green-bar);
      border-radius: 3px;
      transition: width 0.35s ease;
    }

    #dots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
    .dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      font-size: 11px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all 0.15s;
      user-select: none;
    }
    .dot:hover { border-color: var(--text3); }
    .dot.active { border-color: var(--text); color: var(--text); background: var(--bg3); }
    .dot.know { background: var(--green-bg); border-color: var(--green-bg); color: var(--green-text); }
    .dot.dontknow { background: var(--red-bg); border-color: var(--red-bg); color: var(--red-text); }
    .dot.know.active { border-color: var(--green-text); }
    .dot.dontknow.active { border-color: var(--red-text); }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem 1.75rem;
      margin-bottom: 1rem;
    }
    .card-index { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
    .card-composer { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 0.35rem; transition: filter 0.15s; }
    .card-title { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 0.4rem; transition: filter 0.15s; }
    .card-detail { font-size: 14px; color: var(--text2); transition: filter 0.15s; }
    .blurred { filter: blur(5px); cursor: pointer; }
    .blurred:hover { filter: blur(0); }

    .status-badge {
      display: inline-block;
      margin-top: 1.1rem;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 13px; font-weight: 500;
    }
    .badge-know { background: var(--green-bg); color: var(--green-text); }
    .badge-dontknow { background: var(--red-bg); color: var(--red-text); }

    #player-wrap {
      background: var(--bg3);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 0.75rem;
    }
    #play-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: center;
      transition: opacity 0.15s, transform 0.1s;
      position: relative;
    }
    #play-btn:hover { opacity: 0.85; transform: scale(1.05); }
    #play-btn:active { transform: scale(0.95); }
    #play-btn svg { width: 20px; height: 20px; fill: var(--bg); }
    #seek-wrap { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; padding-top: 15px; }
    #seek {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
    }
    #seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }
    #seek::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
    }
    #time-display { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }

    #btn-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; }
    .btn {
      flex: 1; padding: 0.85rem;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn-know { background: var(--green-bg); color: var(--green-text); }
    .btn-dontknow { background: var(--red-bg); color: var(--red-text); }

    #toggles { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 0.75rem; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      user-select: none;
    }
    .toggle-label { font-size: 13px; color: var(--text2); }
    .toggle-sw {
      width: 36px; height: 20px;
      background: var(--border2);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-sw::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }
    .toggle-sw.on { background: var(--green-bar); }
    .toggle-sw.on::after { transform: translateX(16px); }

    /* Clip duration selector — shown only when clip mode is on */
    #clip-duration-row {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.55rem 0.85rem 0.55rem 2.5rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      margin-top: -0.5rem;
    }
    #clip-duration-row.visible { display: flex; }
    #clip-duration-row label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .clip-stepper { display: flex; align-items: center; gap: 0.5rem; }
    .clip-step-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--text2);
      font-size: 16px; line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }
    .clip-step-btn:hover { border-color: var(--text3); }
    .clip-step-btn:active { opacity: 0.7; }
    #clip-val { font-size: 13px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; min-width: 42px; text-align: center; }

    #nav-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .btn-nav {
      flex: 1; padding: 0.55rem;
      border: 1px solid var(--border2);
      background: var(--bg2);
      border-radius: var(--radius-md);
      font-size: 13px; cursor: pointer;
      color: var(--text2); font-family: inherit;
      transition: border-color 0.15s;
    }
    .btn-nav:hover { border-color: var(--text3); }

    #reset-wrap { text-align: center; }
    #reset-btn {
      font-size: 12px; color: var(--text3);
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
      font-family: inherit; padding: 0;
    }
    #reset-btn:hover { color: var(--text2); }

    @media (max-width: 600px) {
      body { padding: 1.25rem 0.75rem 3rem; }
      #app { max-width: 100%; }
      h1 { font-size: 11px; margin-bottom: 1.25rem; }
      .stat-num { font-size: 22px; }
      .stat-label { font-size: 11px; }
      #stats { gap: 1rem; }
      .dot { width: 34px; height: 34px; font-size: 12px; }
      .card { padding: 1.25rem; }
      .card-composer { font-size: 14px; }
      .card-title { font-size: 22px; }
      .card-detail { font-size: 15px; }
      .card-index { font-size: 13px; }
      .status-badge { font-size: 14px; padding: 5px 14px; }
      #play-btn { width: 52px; height: 52px; }
      #player-wrap { padding: 0.9rem 1rem; }
      #seek { height: 6px; }
      #seek::-webkit-slider-thumb { width: 18px; height: 18px; }
      #seek::-moz-range-thumb { width: 18px; height: 18px; }
      #time-display { font-size: 13px; }
      .btn { padding: 1rem; font-size: 17px; }
      .toggle-row { padding: 0.75rem 1rem; }
      .toggle-label { font-size: 15px; }
      .toggle-sw { width: 44px; height: 24px; }
      .toggle-sw::after { width: 18px; height: 18px; }
      .toggle-sw.on::after { transform: translateX(20px); }
      .btn-nav { padding: 0.75rem; font-size: 15px; }
      #reset-btn { font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="app">
  <h1>Klassitsismi kuulamiskava</h1>

  <div id="stats">
    <div class="stat">
      <span class="stat-num" id="stat-total">15</span>
      <span class="stat-label">Kokku</span>
    </div>
    <div class="stat">
      <span class="stat-num green" id="stat-know">0</span>
      <span class="stat-label">Tean</span>
    </div>
    <div class="stat">
      <span class="stat-num red" id="stat-dontknow">0</span>
      <span class="stat-label">Ei tea</span>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar" style="width:0%"></div>
  </div>

  <div id="dots"></div>

  <div class="card">
    <div class="card-index" id="card-index"></div>
    <div class="card-composer" id="card-composer"></div>
    <div class="card-title" id="card-title"></div>
    <div class="card-detail" id="card-detail"></div>
    <div id="card-badge"></div>
  </div>

  <div id="player-wrap">
    <button id="play-btn" onclick="togglePlay()">
      <svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
    </button>
    <div id="seek-wrap">
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" oninput="seekTo(this.value)">
      <span id="time-display">0:00 / 0:00</span>
    </div>
  </div>

  <div id="btn-row">
    <button class="btn btn-know" onclick="mark('know')">Tean</button>
    <button class="btn btn-dontknow" onclick="mark('dontknow')">Ei tea</button>
  </div>

  <div id="toggles">
    <div class="toggle-row" onclick="toggleMode('autoplay')">
      <span class="toggle-label">Automaatne m&#228;ngimine</span>
      <div class="toggle-sw on" id="sw-autoplay"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('random')">
      <span class="toggle-label">Juhuslik alguskoht</span>
      <div class="toggle-sw" id="sw-random"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('shuffle')">
      <span class="toggle-label">Suvaline j&#228;rjekord</span>
      <div class="toggle-sw" id="sw-shuffle"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('autoplay')">
      <span class="toggle-label">Automaatne m&#228;ngimine</span>
      <div class="toggle-sw on" id="sw-autoplay"></div>
    </div>
    <div class="toggle-row" onclick="toggleMode('clip')">
      <span class="toggle-label">L&#245;igu pikkus</span>
      <div class="toggle-sw" id="sw-clip"></div>
    </div>
    <div id="clip-duration-row">
      <label>Kestus</label>
      <div class="clip-stepper">
        <button class="clip-step-btn" onclick="stepClip(-5)">&#8722;</button>
        <span id="clip-val">10 s</span>
        <button class="clip-step-btn" onclick="stepClip(5)">+</button>
      </div>
    </div>
    <div class="toggle-row" onclick="toggleMode('blur')">
      <span class="toggle-label">Peida nimed</span>
      <div class="toggle-sw" id="sw-blur"></div>
    </div>
  </div>

  <div id="nav-row">
    <button class="btn-nav" onclick="go(-1)">Eelmine laul</button>
    <button class="btn-nav" onclick="go(1)">J&#228;rgmine laul</button>
  </div>

  <div id="reset-wrap">
    <button id="reset-btn" onclick="resetAll()">Kustuta k&#245;ik valikud</button>
  </div>
</div>

<script>
  var SONGS = [
    { composer: "Joseph Haydn", title: "Trompetikontsert Es-duur", detail: "III osa", audio: "/audio/01.mp3" },
    { composer: "Joseph Haydn", title: "Keelpillikvartett op 76, nr 3 (Keisrikvartett)", detail: "II osa", audio: "/audio/02.mp3" },
    { composer: "Joseph Haydn", title: "S\u00fcmfoonia nr 94 (\u00dcllatuss\u00fcmfoonia)", detail: "II osa", audio: "/audio/03.mp3" },
    { composer: "Joseph Haydn", title: "S\u00fcmfoonia nr 45 (Lahkumiss\u00fcmfoonia)", detail: "I osa", audio: "/audio/04.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "S\u00fcmfoonia nr 40", detail: "I osa", audio: "/audio/05.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Klaverikontsert nr 20 d-moll", detail: "II osa", audio: "/audio/06.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "V\u00e4ike \u00f6\u00f6muusika", detail: "I osa \u2014 Allegro", audio: "/audio/07.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Avam\u00e4ng ooperist \u201eFigaro pulm\u201c", detail: "", audio: "/audio/08.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Ooper \u201eV\u00f5lufl\u00f6\u00f6t\u201c", detail: "Koor I vaatusest", audio: "/audio/09.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Reekviem", detail: "Koor \u201eLacrimosa\u201c (Pisaraterohke p\u00e4ev)", audio: "/audio/10.mp3" },
    { composer: "Ludwig van Beethoven", title: "Klaverisonaat nr 23 (Appassionata)", detail: "I osa", audio: "/audio/11.mp3" },
    { composer: "Ludwig van Beethoven", title: "Klaverisonaat nr 8 (Pateetiline)", detail: "II osa", audio: "/audio/12.mp3" },
    { composer: "Ludwig van Beethoven", title: "S\u00fcmfoonia nr 5", detail: "I osa", audio: "/audio/13.mp3" },
    { composer: "Ludwig van Beethoven", title: "S\u00fcmfoonia nr 7", detail: "II osa \u2014 Allegretto", audio: "/audio/14.mp3" },
    { composer: "Ludwig van Beethoven", title: "S\u00fcmfoonia nr 9", detail: "IV osa \u2014 \u201eOod r\u00f5\u00f5mule\u201c (katkend)", audio: "/audio/15.mp3" }
  ];

  var KEY = 'klassitsism_v1';
  var state = { marks: {}, seen: {} };
  try { var sv = localStorage.getItem(KEY); if (sv) state = JSON.parse(sv); } catch(e) {}

  var cur = 0;
  var loadedIdx = -1;
  var modeAutoplay = true;
  var modeRandom = false;
  var modeShuffle = false;
  var modeAutoplay = true;
  var modeClip = false;
  var modeBlur = false;
  var clipDuration = 10;
  var clipTimer = null;
  var shuffleQueue = [];
  var player = new Audio();

  player.addEventListener('timeupdate', function() {
    if (!player.duration) return;
    document.getElementById('seek').value = (player.currentTime / player.duration) * 100;
    document.getElementById('time-display').textContent = fmt(player.currentTime) + ' / ' + fmt(player.duration);
  });
  player.addEventListener('ended', function() {
    clearClipTimer();
    if (modeAutoplay) {
      cur = nextIdx(cur, 1);
      state.seen[cur] = true;
      save();
      render(true);
    } else {
      document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    }
  });
  player.addEventListener('loadedmetadata', function() {
    document.getElementById('time-display').textContent = '0:00 / ' + fmt(player.duration);
    if (modeRandom && player.duration > 0) {
      player.currentTime = Math.random() * player.duration;
    }
  });
  player.addEventListener('error', function() {
    document.getElementById('time-display').textContent = 'Viga';
  });

  function fmt(sec) {
    var m = Math.floor(sec / 60);
    var s2 = Math.floor(sec % 60).toString().padStart(2, '0');
    return m + ':' + s2;
  }

  function clearClipTimer() {
    if (clipTimer) { clearTimeout(clipTimer); clipTimer = null; }
  }

  function startClipTimer() {
    clearClipTimer();
    if (!modeClip) return;
    clipTimer = setTimeout(function() {
      player.pause();
      document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    }, clipDuration * 1000);
  }

  function stepClip(delta) {
    clipDuration = Math.max(5, Math.min(300, clipDuration + delta));
    document.getElementById('clip-val').textContent = clipDuration + ' s';
  }

  // Load song at idx. If wasPlaying is true, auto-play after load.
  function loadSong(idx, autoplay) {
    if (loadedIdx === idx) {
      if (autoplay && player.paused) {
        player.play().then(function() {
          document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
          startClipTimer();
        }).catch(function() {});
      }
      return;
    }
    clearClipTimer();
    player.pause();
    player.src = SONGS[idx].audio;
    player.load();
    loadedIdx = idx;
    document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
    document.getElementById('seek').value = 0;
    document.getElementById('time-display').textContent = '0:00 / 0:00';
    if (autoplay) {
      player.addEventListener('canplay', function onCanPlay() {
        player.removeEventListener('canplay', onCanPlay);
        player.play().then(function() {
          document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
          startClipTimer();
        }).catch(function() {});
      });
    }
  }

  function togglePlay() {
    if (loadedIdx !== cur) {
      loadSong(cur, true);
      return;
    }
    if (player.paused) {
      player.play().then(function() {
        document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>';
        startClipTimer();
      }).catch(function(e) {
        console.warn('Play failed', e);
      });
    } else {
      player.pause();
      document.getElementById('play-icon').outerHTML = '<svg id="play-icon" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>';
      clearClipTimer();
    }
  }

  function seekTo(val) {
    if (player.duration) player.currentTime = (val / 100) * player.duration;
  }

  function buildShuffleQueue() {
    var n = SONGS.length;
    var arr = [];
    for (var i = 0; i < n; i++) {
      if (state.marks[i] !== 'know') arr.push(i);
    }
    // Fisher-Yates shuffle
    for (var j = arr.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = arr[j]; arr[j] = arr[k]; arr[k] = tmp;
    }
    shuffleQueue = arr;
  }

  function toggleMode(mode) {
    if (mode === 'autoplay') {
      modeAutoplay = !modeAutoplay;
      document.getElementById('sw-autoplay').classList.toggle('on', modeAutoplay);
    } else if (mode === 'random') {
      modeRandom = !modeRandom;
      document.getElementById('sw-random').classList.toggle('on', modeRandom);
    } else if (mode === 'shuffle') {
      modeShuffle = !modeShuffle;
      document.getElementById('sw-shuffle').classList.toggle('on', modeShuffle);
      if (modeShuffle) buildShuffleQueue();
    } else if (mode === 'clip') {
      modeClip = !modeClip;
      document.getElementById('sw-clip').classList.toggle('on', modeClip);
      document.getElementById('clip-duration-row').classList.toggle('visible', modeClip);
      if (!modeClip) clearClipTimer();
    } else if (mode === 'blur') {
      modeBlur = !modeBlur;
      document.getElementById('sw-blur').classList.toggle('on', modeBlur);
      applyBlur();
    }
  }

  function applyBlur() {
    ['card-composer', 'card-title', 'card-detail'].forEach(function(id) {
      document.getElementById(id).classList.toggle('blurred', modeBlur);
    });
  }

  function nextIdx(from, dir) {
    var n = SONGS.length;
    if (modeShuffle) {
      if (!shuffleQueue.length) buildShuffleQueue();
      if (!shuffleQueue.length) return from;
      var next = shuffleQueue.shift();
      return next;
    }
    var idx = (from + dir + n) % n;
    for (var i = 0; i < n - 1; i++) {
      if (state.marks[idx] !== 'know') return idx;
      idx = (idx + dir + n) % n;
    }
    return (from + dir + n) % n;
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  }

  function render(autoplay) {
    var s = SONGS[cur];
    document.getElementById('card-index').textContent = (cur + 1) + ' / ' + SONGS.length;
    document.getElementById('card-composer').textContent = s.composer;
    document.getElementById('card-title').textContent = s.title;
    document.getElementById('card-detail').textContent = s.detail;
    applyBlur();

    var badge = document.getElementById('card-badge');
    var m = state.marks[cur];
    if (m === 'know') badge.innerHTML = '<span class="status-badge badge-know">Tean</span>';
    else if (m === 'dontknow') badge.innerHTML = '<span class="status-badge badge-dontknow">Ei tea</span>';
    else badge.innerHTML = '';

    updateStats();
    renderDots();
    loadSong(cur, !!autoplay);
  }

  function updateStats() {
    var know = Object.values(state.marks).filter(function(v) { return v === 'know'; }).length;
    var dont = Object.values(state.marks).filter(function(v) { return v === 'dontknow'; }).length;
    document.getElementById('stat-know').textContent = know;
    document.getElementById('stat-dontknow').textContent = dont;
    document.getElementById('progress-bar').style.width = (((know + dont) / SONGS.length) * 100).toFixed(1) + '%';
  }

  function renderDots() {
    var wrap = document.getElementById('dots');
    wrap.innerHTML = '';
    SONGS.forEach(function(_, i) {
      var d = document.createElement('div');
      var cls = 'dot';
      if (i === cur) cls += ' active';
      if (state.marks[i] === 'know') cls += ' know';
      else if (state.marks[i] === 'dontknow') cls += ' dontknow';
      d.className = cls;
      d.textContent = i + 1;
      d.onclick = (function(idx) {
        return function() {
          var wasPlaying = !player.paused;
          cur = idx; state.seen[idx] = true; save();
          render(wasPlaying);
        };
      })(i);
      wrap.appendChild(d);
    });
  }

  function mark(val) {
    state.marks[cur] = val;
    state.seen[cur] = true;
    save();
    cur = nextIdx(cur, 1);
    state.seen[cur] = true;
    save();
    render(false);
  }

  function go(dir) {
    var wasPlaying = !player.paused;
    cur = nextIdx(cur, dir);
    state.seen[cur] = true;
    save();
    render(wasPlaying);
  }

  function resetAll() {
    if (!confirm('Kustuta k\u00f5ik valikud?')) return;
    state = { marks: {}, seen: {} };
    cur = 0;
    save();
    render(false);
  }

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
    else if (e.key === 'k' || e.key === 'K') mark('know');
    else if (e.key === 'e' || e.key === 'E') mark('dontknow');
    else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  });

  state.seen[0] = true;
  save();
  render(false);
</script>
</body>
</html>
