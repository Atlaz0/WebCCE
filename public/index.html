<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klassitsismi kuulamiskava</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --bg2: #ffffff;
      --bg3: #eceae4;
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --green-bg: #eaf3de;
      --green-text: #3b6d11;
      --green-bar: #639922;
      --red-bg: #fcebeb;
      --red-text: #a32d2d;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg2: #252523;
        --bg3: #2e2e2b;
        --text: #e8e6e0;
        --text2: #a0a09a;
        --text3: #666662;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.15);
        --green-bg: #173404;
        --green-text: #97c459;
        --green-bar: #639922;
        --red-bg: #501313;
        --red-text: #f09595;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }

    #app { width: 100%; max-width: 560px; }

    h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--text3);
      margin-bottom: 1.75rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    #stats { display: flex; gap: 1.25rem; margin-bottom: 1rem; }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-num { font-size: 26px; font-weight: 500; line-height: 1; color: var(--text); }
    .stat-num.green { color: var(--green-text); }
    .stat-num.red { color: var(--red-text); }
    .stat-label { font-size: 12px; color: var(--text3); }

    #progress-bar-wrap {
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--green-bar);
      border-radius: 3px;
      transition: width 0.35s ease;
    }

    #dots { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
    .dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: var(--bg2);
      cursor: pointer;
      font-size: 11px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: all 0.15s;
      user-select: none;
    }
    .dot:hover { border-color: var(--text3); }
    .dot.active { border-color: var(--text); color: var(--text); background: var(--bg3); }
    .dot.know { background: var(--green-bg); border-color: var(--green-bg); color: var(--green-text); }
    .dot.dontknow { background: var(--red-bg); border-color: var(--red-bg); color: var(--red-text); }
    .dot.know.active { border-color: var(--green-text); }
    .dot.dontknow.active { border-color: var(--red-text); }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.75rem 1.75rem;
      margin-bottom: 1rem;
    }
    .card-index { font-size: 12px; color: var(--text3); margin-bottom: 0.75rem; }
    .card-composer { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 0.35rem; }
    .card-title { font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 0.4rem; }
    .card-detail { font-size: 14px; color: var(--text2); }

    .status-badge {
      display: inline-block;
      margin-top: 1.1rem;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 13px; font-weight: 500;
    }
    .badge-know { background: var(--green-bg); color: var(--green-text); }
    .badge-dontknow { background: var(--red-bg); color: var(--red-text); }

    #player-wrap {
      background: var(--bg3);
      border-radius: var(--radius-md);
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    #play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #play-btn:hover { opacity: 0.8; }
    #seek-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    #seek {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 2px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
    }
    #seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }
    #seek::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
    }
    #time-display { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }

    #btn-row { display: flex; gap: 0.75rem; margin-bottom: 0.6rem; }
    .btn {
      flex: 1; padding: 0.85rem;
      border: none; border-radius: var(--radius-md);
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: inherit;
    }
    .btn:active { opacity: 0.75; transform: scale(0.98); }
    .btn-know { background: var(--green-bg); color: var(--green-text); }
    .btn-dontknow { background: var(--red-bg); color: var(--red-text); }

    #nav-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .btn-nav {
      flex: 1; padding: 0.55rem;
      border: 1px solid var(--border2);
      background: var(--bg2);
      border-radius: var(--radius-md);
      font-size: 13px; cursor: pointer;
      color: var(--text2); font-family: inherit;
      transition: border-color 0.15s, opacity 0.15s;
    }
    .btn-nav:hover { border-color: var(--text3); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }

    #reset-btn {
      font-size: 12px; color: var(--text3);
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
      font-family: inherit; padding: 0;
    }
    #reset-btn:hover { color: var(--text2); }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.25rem; }
      .card-title { font-size: 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <h1>Klassitsismi kuulamiskava</h1>

  <div id="stats">
    <div class="stat">
      <span class="stat-num" id="stat-total">15</span>
      <span class="stat-label">kokku</span>
    </div>
    <div class="stat">
      <span class="stat-num green" id="stat-know">0</span>
      <span class="stat-label">tean</span>
    </div>
    <div class="stat">
      <span class="stat-num red" id="stat-dontknow">0</span>
      <span class="stat-label">ei tea</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="stat-seen">0</span>
      <span class="stat-label">kuulatud</span>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-bar" style="width:0%"></div>
  </div>

  <div id="dots"></div>

  <div class="card">
    <div class="card-index" id="card-index"></div>
    <div class="card-composer" id="card-composer"></div>
    <div class="card-title" id="card-title"></div>
    <div class="card-detail" id="card-detail"></div>
    <div id="card-badge"></div>
  </div>

  <div id="player-wrap">
    <button id="play-btn" onclick="togglePlay()">&#9654;</button>
    <div id="seek-wrap">
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1" oninput="seekTo(this.value)">
      <span id="time-display">0:00 / 0:00</span>
    </div>
  </div>

  <div id="btn-row">
    <button class="btn btn-know" onclick="mark('know')">&#10003; Tean</button>
    <button class="btn btn-dontknow" onclick="mark('dontknow')">&#10007; Ei tea</button>
  </div>

  <div id="nav-row">
    <button class="btn-nav" id="btn-prev" onclick="go(-1)">&larr; Eelmine</button>
    <button class="btn-nav" id="btn-next" onclick="go(1)">Jargmine &rarr;</button>
  </div>

  <button id="reset-btn" onclick="resetAll()">lahtesta koik margistused</button>
</div>

<script>
  var SONGS = [
    { composer: "Joseph Haydn", title: "Trompetikontsert Es-duur", detail: "III osa", audio: "/audio/01.mp3" },
    { composer: "Joseph Haydn", title: "Keelpillikvartett op 76, nr 3 (Keisrikvartett)", detail: "II osa", audio: "/audio/02.mp3" },
    { composer: "Joseph Haydn", title: "Sumfoonia nr 94 (Ullatussumfoonia)", detail: "II osa", audio: "/audio/03.mp3" },
    { composer: "Joseph Haydn", title: "Sumfoonia nr 45 (Lahkumissumfoonia)", detail: "I osa", audio: "/audio/04.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Sumfoonia nr 40", detail: "I osa", audio: "/audio/05.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Klaverikontsert nr 20 d-moll", detail: "II osa", audio: "/audio/06.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Vaike oomuusika", detail: "I osa - Allegro", audio: "/audio/07.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Avamang ooperist Figaro pulm", detail: "", audio: "/audio/08.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Ooper Volufloot", detail: "koor I vaatusest", audio: "/audio/09.mp3" },
    { composer: "Wolfgang Amadeus Mozart", title: "Reekviem", detail: "koor Lacrimosa (Pisaraterohke paev)", audio: "/audio/10.mp3" },
    { composer: "Ludwig van Beethoven", title: "Klaverisonaat nr 23 (Appassionata)", detail: "I osa", audio: "/audio/11.mp3" },
    { composer: "Ludwig van Beethoven", title: "Klaverisonaat nr 8 (Pateetiline)", detail: "II osa", audio: "/audio/12.mp3" },
    { composer: "Ludwig van Beethoven", title: "Sumfoonia nr 5", detail: "I osa", audio: "/audio/13.mp3" },
    { composer: "Ludwig van Beethoven", title: "Sumfoonia nr 7", detail: "II osa - Allegretto", audio: "/audio/14.mp3" },
    { composer: "Ludwig van Beethoven", title: "Sumfoonia nr 9", detail: "IV osa - Ood roomule (katkend)", audio: "/audio/15.mp3" }
  ];

  var KEY = 'klassitsism_v1';
  var state = { marks: {}, seen: {} };
  try { var s = localStorage.getItem(KEY); if (s) state = JSON.parse(s); } catch(e) {}
  var cur = 0;
  var audio = new Audio();

  audio.addEventListener('timeupdate', function() {
    if (!audio.duration) return;
    document.getElementById('seek').value = (audio.currentTime / audio.duration) * 100;
    document.getElementById('time-display').textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
  });
  audio.addEventListener('ended', function() {
    document.getElementById('play-btn').innerHTML = '&#9654;';
  });
  audio.addEventListener('loadedmetadata', function() {
    document.getElementById('time-display').textContent = '0:00 / ' + fmt(audio.duration);
    document.getElementById('seek').value = 0;
  });

  function fmt(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  function loadAudio(idx) {
    var wasPlaying = !audio.paused;
    audio.pause();
    audio.src = SONGS[idx].audio;
    audio.load();
    document.getElementById('play-btn').innerHTML = '&#9654;';
    document.getElementById('seek').value = 0;
    document.getElementById('time-display').textContent = '0:00 / 0:00';
    if (wasPlaying) {
      audio.play();
      document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
    }
  }

  function togglePlay() {
    if (audio.paused) {
      if (!audio.src || audio.src === window.location.href) audio.src = SONGS[cur].audio;
      audio.play();
      document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
    } else {
      audio.pause();
      document.getElementById('play-btn').innerHTML = '&#9654;';
    }
  }

  function seekTo(val) {
    if (audio.duration) audio.currentTime = (val / 100) * audio.duration;
  }

  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {}
  }

  function render() {
    var s = SONGS[cur];
    document.getElementById('card-index').textContent = (cur + 1) + ' / ' + SONGS.length;
    document.getElementById('card-composer').textContent = s.composer;
    document.getElementById('card-title').textContent = s.title;
    document.getElementById('card-detail').textContent = s.detail;

    var badge = document.getElementById('card-badge');
    var m = state.marks[cur];
    if (m === 'know') badge.innerHTML = '<span class="status-badge badge-know">&#10003; Tean</span>';
    else if (m === 'dontknow') badge.innerHTML = '<span class="status-badge badge-dontknow">&#10007; Ei tea</span>';
    else badge.innerHTML = '';

    document.getElementById('btn-prev').disabled = cur === 0;
    document.getElementById('btn-next').disabled = cur === SONGS.length - 1;
    updateStats();
    renderDots();
    loadAudio(cur);
  }

  function updateStats() {
    var know = Object.values(state.marks).filter(function(v) { return v === 'know'; }).length;
    var dont = Object.values(state.marks).filter(function(v) { return v === 'dontknow'; }).length;
    var seen = Object.keys(state.seen).length;
    document.getElementById('stat-know').textContent = know;
    document.getElementById('stat-dontknow').textContent = dont;
    document.getElementById('stat-seen').textContent = seen;
    document.getElementById('progress-bar').style.width = (((know + dont) / SONGS.length) * 100).toFixed(1) + '%';
  }

  function renderDots() {
    var wrap = document.getElementById('dots');
    wrap.innerHTML = '';
    SONGS.forEach(function(_, i) {
      var d = document.createElement('div');
      var cls = 'dot';
      if (i === cur) cls += ' active';
      if (state.marks[i] === 'know') cls += ' know';
      else if (state.marks[i] === 'dontknow') cls += ' dontknow';
      d.className = cls;
      d.textContent = i + 1;
      d.onclick = (function(idx) {
        return function() { cur = idx; state.seen[idx] = true; save(); render(); };
      })(i);
      wrap.appendChild(d);
    });
  }

  function mark(val) {
    state.marks[cur] = val;
    state.seen[cur] = true;
    save();
    if (cur < SONGS.length - 1) { cur++; state.seen[cur] = true; save(); }
    render();
  }

  function go(dir) {
    cur = Math.max(0, Math.min(SONGS.length - 1, cur + dir));
    state.seen[cur] = true;
    save();
    render();
  }

  function resetAll() {
    if (!confirm('Lahtesta koik margistused?')) return;
    state = { marks: {}, seen: {} };
    cur = 0;
    save();
    render();
  }

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
    else if (e.key === 'k' || e.key === 'K') mark('know');
    else if (e.key === 'e' || e.key === 'E') mark('dontknow');
    else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  });

  state.seen[0] = true;
  save();
  render();
</script>
</body>
</html>
